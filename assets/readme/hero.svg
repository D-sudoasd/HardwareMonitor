<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">HardwareMonitor</title>
  <desc id="desc">Always-on-top Windows micro-bar for CPU, memory, disk, I/O, and temperature without covering your work.</desc>
  <rect width="1200" height="360" rx="26" fill="#050607"/>
  <path d="M0 52H1200M718 0V360" stroke="#1C1F24"/>
  <g transform="translate(56 40)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text fill="#7A8088" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="2.4">WINDOWS DESKTOP · LOW-OBSTRUCTION TELEMETRY</text>
    <text y="96" fill="#F4F5F6" font-size="58" font-weight="750" letter-spacing="-2.2">HardwareMonitor</text>
    <text y="144" fill="#A8ADB4" font-size="23" font-weight="450">Live system metrics in a 38 px bar — not a dashboard.</text>
    <path d="M0 172H520" stroke="#2A2E34"/>
    <g transform="translate(0 206)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
      <text fill="#F4F5F6">CPU</text>
      <text x="72" fill="#6E747C">MEM</text>
      <text x="148" fill="#6E747C">DISK</text>
      <text x="228" fill="#6E747C">I/O</text>
      <text x="292" fill="#6E747C">TEMP</text>
      <text x="376" fill="#6E747C">NO FAKE °C</text>
    </g>
    <text y="268" fill="#5A6068" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">portable ZIP · MIT · LibreHardwareMonitor sensors</text>
  </g>
  <!-- precise micro-bar specimen -->
  <g transform="translate(760 78)">
    <rect x="-18" y="-24" width="404" height="228" fill="#0B0D10" stroke="#262A30"/>
    <text x="12" y="8" fill="#4A5058" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">DESKTOP / ALWAYS-ON-TOP</text>
    <!-- bar -->
    <rect y="28" width="368" height="42" rx="8" fill="#12151A" stroke="#343A42"/>
    <rect x="12" y="40" width="3" height="18" rx="1.5" fill="#8FD3FF"/>
    <text x="22" y="54" fill="#8A9098" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">CPU</text>
    <text x="56" y="54" fill="#F4F5F6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="750">56%</text>
    <rect x="108" y="40" width="3" height="18" rx="1.5" fill="#8FE3B8"/>
    <text x="118" y="54" fill="#8A9098" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">MEM</text>
    <text x="156" y="54" fill="#F4F5F6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="750">40%</text>
    <rect x="210" y="40" width="3" height="18" rx="1.5" fill="#E8C36A"/>
    <text x="220" y="54" fill="#8A9098" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">DSK</text>
    <text x="254" y="54" fill="#F4F5F6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="750">69%</text>
    <rect x="300" y="40" width="3" height="18" rx="1.5" fill="#E8A0C0"/>
    <text x="310" y="54" fill="#F4F5F6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">IO</text>
    <!-- trend -->
    <rect y="88" width="368" height="100" rx="8" fill="#12151A" stroke="#343A42"/>
    <text x="14" y="112" fill="#6E747C" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">10-minute in-memory history</text>
    <polyline points="20,160 70,152 120,156 170,140 220,146 270,132 320,148 348,138" fill="none" stroke="#8FD3FF" stroke-width="2.2"/>
    <polyline points="20,168 348,168" fill="none" stroke="#343A42" stroke-width="1"/>
  </g>
  <text x="1144" y="336" text-anchor="end" fill="#4A5058" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">D-sudoasd / HardwareMonitor</text>
</svg>
