<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">HardwareMonitor</title>
  <desc id="desc">Windows desktop micro-bar for CPU, memory, disk, I/O, and temperature status without covering your work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1016"/>
      <stop offset="100%" stop-color="#121a24"/>
    </linearGradient>
    <linearGradient id="barGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a7f3d0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <!-- faint desktop document silhouettes -->
  <g opacity="0.18" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">
    <text x="64" y="86">analysis.csv</text>
    <text x="64" y="128">beamtime_notes.md</text>
    <text x="64" y="170">processing_report.xlsx</text>
    <text x="64" y="212">diffraction_scan_042.tif</text>
  </g>

  <!-- left title block -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="64" y="250" fill="#7dd3fc" font-size="18" font-weight="700" letter-spacing="2">WINDOWS · ALWAYS ON TOP</text>
    <text x="64" y="300" fill="#f8fafc" font-size="48" font-weight="800">HardwareMonitor</text>
    <text x="64" y="336" fill="#94a3b8" font-size="20">Live system telemetry in a 38 px micro-bar</text>
  </g>

  <!-- floating micro-bar proof -->
  <g transform="translate(560 72)">
    <rect x="-12" y="-12" width="600" height="220" rx="20" fill="url(#barGlow)"/>
    <rect x="0" y="0" width="576" height="48" rx="12" fill="#11161d" stroke="#364150" stroke-width="2"/>
    <rect x="16" y="13" width="5" height="22" rx="2.5" fill="#7dd3fc"/>
    <text x="30" y="31" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">CPU</text>
    <text x="72" y="31" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">56%</text>
    <rect x="140" y="13" width="5" height="22" rx="2.5" fill="#a7f3d0"/>
    <text x="154" y="31" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">MEM</text>
    <text x="200" y="31" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">40%</text>
    <rect x="272" y="13" width="5" height="22" rx="2.5" fill="#fbbf24"/>
    <text x="286" y="31" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">DSK</text>
    <text x="328" y="31" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">69%</text>
    <rect x="392" y="13" width="5" height="22" rx="2.5" fill="#f472b6"/>
    <text x="406" y="31" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">IO</text>
    <text x="434" y="31" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">R65/W73</text>
    <rect x="528" y="13" width="5" height="22" rx="2.5" fill="#c4b5fd"/>
    <text x="542" y="31" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">TEMP</text>

    <!-- expanded trend panel -->
    <rect x="0" y="64" width="576" height="132" rx="12" fill="#11161d" stroke="#364150" stroke-width="2"/>
    <text x="20" y="92" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">Click to expand · 10-minute in-memory history</text>
    <rect x="20" y="110" width="536" height="66" rx="8" fill="#151b23" stroke="#2a3441"/>
    <polyline points="36,155 96,148 156,152 216,138 276,142 336,128 396,150 456,136 516,130 540,138" fill="none" stroke="#7dd3fc" stroke-width="3.5"/>
    <polyline points="36,160 540,160" fill="none" stroke="#a7f3d0" stroke-width="2.5"/>
    <polyline points="36,168 540,168" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  </g>

  <!-- bottom metadata chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
    <rect x="560" y="308" width="92" height="28" rx="8" fill="#1e293b"/>
    <text x="576" y="327" fill="#94a3b8">portable</text>
    <rect x="664" y="308" width="72" height="28" rx="8" fill="#1e293b"/>
    <text x="680" y="327" fill="#94a3b8">MIT</text>
    <rect x="748" y="308" width="140" height="28" rx="8" fill="#1e293b"/>
    <text x="764" y="327" fill="#94a3b8">no fabricated °C</text>
  </g>
</svg>
